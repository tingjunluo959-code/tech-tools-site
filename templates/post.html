<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ post.summary }}">
  <title>{{ post.title }} | {{ site_name }}</title>
  <link rel="alternate" type="application/rss+xml" title="{{ site_name }} RSS" href="../rss.xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    :root { --pico-font-family-sans-serif: system-ui, "PingFang SC", "Microsoft YaHei", sans-serif; }
    body > main { max-width: 820px; }
    .meta { color: var(--pico-muted-color); }
    .disclosure { border-left: .25rem solid var(--pico-primary); padding-left: 1rem; }
    article { overflow-wrap: anywhere; }
    footer { padding-block: 2rem; }
  </style>
  <!-- Google AdSense 自动广告：将 ca-pub-xxxxxxxxxxxxxxxx 替换为发布商 ID 后取消下面一行注释。 -->
  <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-xxxxxxxxxxxxxxxx" crossorigin="anonymous"></script> -->
</head>
<body>
  <header class="container">
    <nav aria-label="主导航">
      <ul><li><a href="../index.html">← 返回首页</a></li></ul>
      <ul><li><a href="../rss.xml">RSS 订阅</a></li></ul>
    </nav>
  </header>

  <main class="container" id="main-content">
    <article>
      <header>
        <h1>{{ post.title }}</h1>
        <p class="meta"><time datetime="{{ post.date.isoformat() }}">{{ post.date_text }}</time> · {{ post.category }}</p>
        <p class="disclosure"><small>披露：本文可能包含联盟链接。若你通过链接购买，本站可能获得佣金，但不会增加你的费用。</small></p>
      </header>
      <section>{{ post.html }}</section>
      <footer>
        <p><a href="{{ post.original_link }}" rel="noopener noreferrer nofollow" target="_blank">查看 Product Hunt 原始页面 ↗</a></p>
      </footer>
    </article>
  </main>

  <footer class="container"><small>内容由自动化工具辅助整理；购买或订阅前请以产品官网最新信息为准。</small></footer>
</body>
</html>
