name: Generate and deploy tech recommendations

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-content-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Generate articles and build site
        env:
          CONTENT_MODE: ${{ vars.CONTENT_MODE || 'template' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-3.5-turbo' }}
          SITE_NAME: ${{ vars.SITE_NAME }}
          SITE_DESCRIPTION: ${{ vars.SITE_DESCRIPTION }}
          SITE_URL: ${{ vars.SITE_URL }}
          AFFILIATE_LINK: ${{ secrets.AFFILIATE_LINK }}
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
          MAX_PRODUCTS_PER_RUN: ${{ vars.MAX_PRODUCTS_PER_RUN || '1' }}
        run: python main.py

      - name: Commit generated content
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all -- docs processed_ids.txt
          if [ -d content ]; then
            git add --all -- content
          fi
          git commit -m "chore: generate daily tech recommendations"
          git push
